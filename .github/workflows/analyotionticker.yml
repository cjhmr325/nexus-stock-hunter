name: Stock Analysis Engine - Option Ticker Update

on:
  schedule:
    # 1. 장 시작 전 최종 데이터 확정 (현재 동부 09:00 AM / UTC 13:00)
    - cron: '0 13 * * *'
    # 2. 장중 중간 점검 및 오후장 방향성 확인 (현재 동부 01:30 PM / UTC 17:30)
    - cron: '30 17 * * *'
  workflow_dispatch: 

jobs:
  update-ticker-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # 필요한 라이브러리를 직접 설치하도록 설정
          pip install yfinance pandas numpy gspread google-auth

      - name: Run Option Ticker Analysis
        env:
          # 파이썬 코드의 os.environ.get('GOOGLE_SHEETS_JSON')과 일치시킴
          GOOGLE_SHEETS_JSON: ${{ secrets.GOOGLE_SHEETS_JSON }}
        run: |
          # 실제 파일명인 analyotionticker.py를 실행
          python analyotionticker.py
